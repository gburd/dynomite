[advisories]
yanked = "warn"
# RUSTSEC-2023-0071 (Marvin Attack on the rsa crate): no fixed
# version is available upstream. The advisory targets PKCS#1 v1.5
# padding oracle attacks; the dynomite::crypto module uses OAEP
# (matching dyn_crypto.c lines 521-538). The non-constant-time
# arithmetic in the rsa crate is still a theoretical concern for
# adversaries that can observe inter-peer DNODE handshake timing,
# and is documented as a Stage 15 hardening item in
# docs/journal/blocked.md. The advisory cannot be eliminated
# without an upstream fix or a switch to a different crypto stack;
# tracked by https://github.com/RustCrypto/RSA/issues/626.
ignore = [
    "RUSTSEC-2023-0071",
    # `paste` is a transitive dependency of `hegeltest` (the
    # property-testing crate, repo: https://github.com/hegeldev/hegel-rust).
    # The crate was archived as unmaintained on 2024-10-07 but it is a
    # build-time-only proc macro with no security surface (it just
    # concatenates identifiers). It cannot be removed without changing
    # `hegeltest` upstream; tracked as a dev-only dependency.
    "RUSTSEC-2024-0436",
    # bincode 1.3.3 is a transitive dependency of dyn-hashtree. The
    # maintainers declare 1.3.3 a complete, final release that needs
    # no updates (the 2.x/3.x lines are separate redesigns); it is not
    # vulnerable, only flagged unmaintained. The 1.x serializer is a
    # stable, self-contained format with no security surface for our
    # use (internal hash-tree node encoding). RUSTSEC-2025-0141.
    "RUSTSEC-2025-0141",
    # rustls-pemfile 2.2.0 is unmaintained: its functionality was
    # folded into rustls-pki-types (>= 1.9.0) and the latest release
    # is now a thin re-export wrapper. Pulled transitively by the
    # rustls / tokio-rustls TLS stack; no vulnerability is implied,
    # only that the standalone crate is archived. Tracked for removal
    # when the TLS stack drops the wrapper. RUSTSEC-2025-0134.
    "RUSTSEC-2025-0134",
]

[bans]
multiple-versions = "allow"
wildcards = "deny"
allow-wildcard-paths = true
workspace-default-features = "allow"

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    # CDLA-Permissive-2.0 is the license on the Mozilla CA root bundle
    # shipped by webpki-roots (the TLS trust anchors). It is a
    # permissive, no-copyleft data license compatible with Apache-2.0.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
