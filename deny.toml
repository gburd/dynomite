[advisories]
yanked = "warn"

[bans]
multiple-versions = "allow"
wildcards = "deny"
allow-wildcard-paths = true
workspace-default-features = "allow"

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
