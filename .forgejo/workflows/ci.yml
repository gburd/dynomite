name: ci

# Codeberg / Forgejo Actions mirror of `.github/workflows/ci.yml`.
# AGENTS.md Section 14b mandates the two workflows stay aligned:
# both invoke `scripts/check.sh` so divergence is impossible.
#
# Forgejo Actions consume the GitHub Actions YAML format with
# minor differences:
#   * `runs-on` accepts the runner labels exposed by the
#     `forgejo-runner` deployment; we use the conventional
#     `docker` label and the `node:20-bookworm` image.
#   * `actions/checkout`, `dtolnay/rust-toolchain`, and
#     `taiki-e/install-action` work unchanged because they are
#     pure-JavaScript actions.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: build / lint / test
    runs-on: docker
    container:
      image: node:20-bookworm
    steps:
      - name: install build prerequisites
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
              build-essential pkg-config libssl-dev curl ca-certificates \
              redis-server libopenblas-dev
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: install nextest
        uses: taiki-e/install-action@nextest
      - name: rustfmt
        run: |
          cargo fmt \
              -p dynomite -p dynomited -p dyn-hash-tool \
              -p dyn-encoding -p dyniak -p dyn-admin \
              -p dyntext -p dynvec -p gen-fsm -p hashtree \
              -p loom-tests -p sup -p throttle-core \
              -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: build (default features)
        run: cargo build --workspace --all-targets --locked
      - name: build (all features)
        run: cargo build --workspace --all-targets --all-features --locked
      - name: nextest (default features)
        run: cargo nextest run --workspace
      - name: nextest (all features)
        run: cargo nextest run --workspace --all-features
      - name: doctests
        run: cargo test --doc --workspace
      - name: check.sh (single source of truth)
        run: scripts/check.sh
      - name: hygiene
        run: |
          scripts/check_no_todos.sh
          scripts/check_no_port_comments.sh
          scripts/check_ascii.sh
          scripts/check_clean.sh
