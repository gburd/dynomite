name: ci

# Codeberg / Forgejo Actions mirror of `.github/workflows/ci.yml`.
# AGENTS.md Section 14b mandates the two workflows stay aligned:
# both invoke `scripts/check.sh` so divergence is impossible.
#
# Forgejo Actions consume the GitHub Actions YAML format with
# minor differences:
#   * `runs-on` accepts the runner labels exposed by the
#     `forgejo-runner` deployment; we use the conventional
#     `docker` label and the `node:20-bookworm` image.
#   * `actions/checkout`, `dtolnay/rust-toolchain`, and
#     `taiki-e/install-action` work unchanged because they are
#     pure-JavaScript actions.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: build / lint / test
    runs-on: docker
    container:
      image: node:20-bookworm
    steps:
      - name: install build prerequisites
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
              build-essential pkg-config libssl-dev curl ca-certificates \
              redis-server libopenblas-dev
      - uses: actions/checkout@v4
      - name: clone lamdb (noxu) sibling-checkout
        run: |
          # On Codeberg this clones a sibling repo from the same
          # owner. The workspace's [workspace.dependencies]
          # declares noxu-* path-deps at ../lamdb/crates/<crate>;
          # cargo validates these paths during `cargo metadata`
          # so they must exist even when noxu features are
          # disabled.
          git clone --depth 1 https://codeberg.org/gregburd/noxu.git ../lamdb
          # Quoracle has its own nested submodule reference
          # that .gitmodules omits; init only the top-level
          # submodule we need without recursing.
          ( cd ../lamdb && git submodule update --init --depth 1 crates/noxu-rep/quoracle )
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: install nextest
        uses: taiki-e/install-action@nextest
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: build (default features)
        run: cargo build --workspace --all-targets --locked
      - name: build (all features)
        run: cargo build --workspace --all-targets --all-features --locked
      - name: nextest (default features)
        run: cargo nextest run --workspace
      - name: nextest (all features)
        run: cargo nextest run --workspace --all-features
      - name: doctests
        run: cargo test --doc --workspace
      - name: check.sh (single source of truth)
        run: scripts/check.sh
      - name: hygiene
        run: |
          scripts/check_no_todos.sh
          scripts/check_no_port_comments.sh
          scripts/check_ascii.sh
          scripts/check_clean.sh
