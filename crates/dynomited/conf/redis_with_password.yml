# Sample config for a dynomite pool fronting a passworded Valkey.
# Mirrors the operator-facing knob added to support `valkey-server
# --requirepass <pw>` deployments.
dyn_o_mite:
  listen: 127.0.0.1:8102
  dyn_listen: 127.0.0.1:8101
  stats_listen: 127.0.0.1:22222
  tokens: '101134286'
  servers:
    - 127.0.0.1:6379:1
  data_store: 0
  # The proxy issues `AUTH <password>` on every freshly opened
  # backend connection right after the TCP handshake. AUTH
  # rejection causes the supervisor to log + reconnect; client
  # traffic is held until AUTH succeeds. Memcache backends ignore
  # this field (binary SASL is not implemented).
  redis_requirepass: my-redis-password
