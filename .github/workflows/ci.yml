name: ci

# AGENTS.md Section 14b mandates that this workflow and
# `.forgejo/workflows/ci.yml` stay in lockstep: both shell out
# to `scripts/check.sh` as the single source of truth.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: build / lint / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: clone lamdb (noxu) sibling-checkout
        # The workspace's [workspace.dependencies] declares
        # noxu-* path-deps at ../lamdb/crates/<crate>. Cargo
        # validates these paths during `cargo metadata`, so
        # we need them present even when noxu features are
        # disabled. The Codeberg `gregburd/noxu` repo is
        # public; we clone it sibling-style as `lamdb` to
        # match the local development layout.
        # --recurse-submodules pulls in the quoracle
        # submodule that noxu-rep depends on.
        run: |
          git clone --depth 1 https://codeberg.org/gregburd/noxu.git ../lamdb
          # Quoracle has its own nested submodule reference
          # that .gitmodules omits; init only the top-level
          # submodule we need without recursing.
          ( cd ../lamdb && git submodule update --init --depth 1 crates/noxu-rep/quoracle )
      - name: install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server libopenblas-dev
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: install nextest
        uses: taiki-e/install-action@nextest
      - name: rustfmt
        run: |
          # Explicit -p list because `cargo fmt --all` reaches
          # into the lamdb path-deps under some workspace shapes.
          cargo fmt \
              -p dynomite -p dynomited -p dyn-hash-tool \
              -p dyn-encoding -p dyn-riak -p dyn-admin \
              -p dyntext -p dynvec -p gen-fsm -p hashtree \
              -p loom-tests -p sup -p throttle-core \
              -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: build (default features)
        run: cargo build --workspace --all-targets --locked
      - name: build (all features)
        run: cargo build --workspace --all-targets --all-features --locked
      - name: nextest (default features)
        run: cargo nextest run --workspace
      - name: nextest (all features)
        run: cargo nextest run --workspace --all-features
      - name: doctests
        run: cargo test --doc --workspace
      - name: check.sh (single source of truth)
        run: scripts/check.sh
      - name: hygiene
        run: |
          scripts/check_no_todos.sh
          scripts/check_no_port_comments.sh
          scripts/check_ascii.sh
          scripts/check_clean.sh
