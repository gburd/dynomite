name: ci

# AGENTS.md Section 14b mandates that this workflow and
# `.forgejo/workflows/ci.yml` stay in lockstep: both shell out
# to `scripts/check.sh` as the single source of truth.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: build / lint / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server libopenblas-dev
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: install nextest
        uses: taiki-e/install-action@nextest
      - name: rustfmt
        run: |
          # Explicit -p list because `cargo fmt --all` reaches
          # into the noxu path-deps under some workspace shapes.
          # Cargo PACKAGE names (some differ from lib names; lib
          # `dynomite` lives in package `dynomite-engine`, etc.)
          cargo fmt \
              -p dynomite-engine -p dynomited -p dyn-hash-tool \
              -p dyn-encoding -p dyniak -p dyn-admin \
              -p dynomite-text -p dynomite-vec -p dynomite-search \
              -p gen-fsm -p dyn-hashtree \
              -p loom-tests -p dyn-sup -p throttle-core \
              -p tre-sys \
              -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: build (default features)
        run: cargo build --workspace --all-targets --locked
      - name: build (all features)
        run: cargo build --workspace --all-targets --all-features --locked
      - name: nextest (default features)
        run: cargo nextest run --workspace
      - name: nextest (all features)
        run: cargo nextest run --workspace --all-features
      - name: doctests
        run: cargo test --doc --workspace
      - name: check.sh (single source of truth)
        run: scripts/check.sh
      - name: hygiene
        run: |
          scripts/check_no_todos.sh
          scripts/check_no_port_comments.sh
          scripts/check_ascii.sh
          scripts/check_clean.sh
